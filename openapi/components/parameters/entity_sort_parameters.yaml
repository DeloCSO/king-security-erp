# Entity-specific `sort` query parameters (query name is always `sort`). Appended under components.parameters — 4-space indent for keys.
    sort_clients:
      name: sort
      in: query
      description: |
        Order the list by choosing a column and direction. Each value uses the form `column|asc` or `column|desc`.

        **Single sort** — pass one argument, for example `sort=id|desc`.

        **Multiple sorts** — chain ordering with repeated `sort[]` keys. The first is the main sort, the next breaks ties, and so on, for example  
        `sort[]=id|desc&sort[]=number|asc`.

        For clients, the API honors `clients` columns (such as `name`, `balance`, `number`), natural ordering for `number`, plus `contacts`, `contact_email`, and `name` / `display_name` (display name is normalized to `name`). Values that are not supported are ignored.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
        example:
          - "name|desc"
          - "balance|asc"
    sort_invoices:
      name: sort
      in: query
      description: |
        Order the list by choosing a column and direction. Each value uses the form `column|asc` or `column|desc`.

        **Single sort** — for example `sort=balance|desc`.

        **Multiple sorts** — use `sort[]` for each level in priority order, for example  
        `sort[]=id|desc&sort[]=number|asc`.

        Invoices accept columns on the `invoices` table, relationship-style keys such as `client.name`, `client_id`, `documents`, `project_id`, and prefixed `client.*` / `contact.*` sorts where the filter supports them. `number` and `status_id` have special handling. Unsupported keys are ignored.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
        example:
          - "number|asc"
          - "balance|desc"
